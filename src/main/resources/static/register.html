<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="css/register.css">
</head>

<body>

<div class="container">

    <div class="register-card">

        <h1>Smart Rescue</h1>

        <p class="subtitle">
            Create Your Account
        </p>

        <form id="registerForm">

            <div class="input-group">
                <label>Name</label>

                <input
                        type="text"
                        id="name"
                        placeholder="Enter your name"
                        required>
            </div>

            <div class="input-group">
                <label>Email</label>

                <input
                        type="email"
                        id="email"
                        placeholder="Enter email"
                        required>
            </div>

            <div class="input-group">
                <label>Password</label>

                <input
                        type="password"
                        id="password"
                        placeholder="Create password"
                        required>
            </div>

            <div class="input-group">
                <label>Role</label>

                <select id="role" required>
                    <option value="">
                        Select Role
                    </option>

                    <option value="VOLUNTEER">
                        Volunteer
                    </option>

                    <option value="REPORTER">
                        Reporter
                    </option>
                </select>
            </div>

            <button type="submit">
                Register
            </button>

        </form>

        <p class="login-text">
            Already have account?

            <a href="login.html">
                Login
            </a>
        </p>

    </div>

</div>

<script src="js/register.js"></script>

</body>
</html>
