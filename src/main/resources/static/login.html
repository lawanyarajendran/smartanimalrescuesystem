<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Rescue Login</title>

    <link rel="stylesheet"
          href="css/login.css">
</head>

<body>

<div class="container">

    <div class="login-card">

        <h1>Smart Rescue</h1>
        <p class="subtitle">
            Animal Rescue & Management System
        </p>

        <form id="loginForm">

            <div class="input-group">
                <label>Email</label>

                <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required
                >
            </div>

            <div class="input-group">
                <label>Password</label>

                <input
                        type="password"
                        id="password"
                        placeholder="Enter password"
                        required
                >
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p class="register-text">
            Don’t have an account?

            <a href="register.html">
                Register
            </a>
        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
